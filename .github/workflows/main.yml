name: Release Arduino Library

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep -E '^version=' library.properties | cut -d'=' -f2 | tr -d '\r' | xargs)"
          echo "Tag: $TAG"
          echo "library.properties version: $VER"
          if [ "$TAG" != "$VER" ]; then
            echo "❌ Tag version ($TAG) does not match library.properties ($VER)"
            exit 1
          fi

      - name: Create library zip
        shell: bash
        run: |
          mkdir -p dist
          LIB_DIR="ATGENXlib"
          ZIP_VER="ATGENXlib-${GITHUB_REF_NAME}.zip"

          # جهّز فولدر وسيط عشان zip يبقى فيه مجلد واحد
          rm -rf ".release_tmp"
          mkdir -p ".release_tmp/$LIB_DIR"

          # انسخ كل حاجة (ما عدا اللي هنستثنيه)
          rsync -av --delete \
            --exclude=".git/" \
            --exclude="dist/" \
            --exclude=".github/" \
            --exclude="node_modules/" \
            --exclude=".DS_Store" \
            --exclude="*.zip" \
            ./ ".release_tmp/$LIB_DIR/"

          # اعمل zip بالإصدار
          (cd ".release_tmp" && zip -r "../dist/$ZIP_VER" "$LIB_DIR")

          # zip ثابت
          cp "dist/$ZIP_VER" "dist/ATGENXlib.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ATGENXlib ${GITHUB_REF_NAME}"
          generate_release_notes: true
          files: |
            dist/ATGENXlib.zip
            dist/ATGENXlib-${{ github.ref_name }}.zip
