name: Release Arduino Library

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (اختياري) تأكد إن version في library.properties مطابق للـ tag
      - name: Validate version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep -E '^version=' library.properties | cut -d'=' -f2 | tr -d '\r' | xargs)"
          echo "Tag: $TAG"
          echo "library.properties version: $VER"
          if [ "$TAG" != "$VER" ]; then
            echo "❌ Tag version ($TAG) does not match library.properties ($VER)"
            exit 1
          fi

      - name: Create library zip
        shell: bash
        run: |
          mkdir -p dist
          ZIP_NAME="ATGENXlib-${GITHUB_REF_NAME}.zip"
          # zip كل ملفات المكتبة (بدون .git و dist)
          zip -r "dist/$ZIP_NAME" . -x ".git/*" -x "dist/*"

          # zip باسم ثابت كمان (يسهّل التحميل في برنامجك)
          cp "dist/$ZIP_NAME" "dist/ATGENXlib.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ATGENXlib ${GITHUB_REF_NAME}"
          generate_release_notes: true
          files: |
            dist/ATGENXlib.zip
            dist/ATGENXlib-${{ github.ref_name }}.zip
